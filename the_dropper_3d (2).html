<div id="gw" style="position:relative;width:100%;height:520px;background:#030810;border-radius:var(--border-radius-lg);overflow:hidden;font-family:var(--font-sans);">
  <canvas id="gc" style="display:block;width:100%;height:100%;"></canvas>

  <div id="hud" style="display:none;position:absolute;top:12px;left:14px;color:#fff;font-size:13px;line-height:1.7;pointer-events:none;text-shadow:0 1px 4px rgba(0,0,0,.8);">
    <div>レベル <span id="lvl">1</span> / 15</div>
    <div>穴 <span id="holes">0</span> / <span id="holesTotal">?</span></div>
    <div style="font-size:11px;color:rgba(255,255,255,.5);margin-top:3px;">WASD / 矢印 : 移動</div>
  </div>

  <div id="scd" style="display:none;position:absolute;top:12px;right:14px;color:#fff;font-size:13px;text-align:right;text-shadow:0 1px 4px rgba(0,0,0,.8);pointer-events:none;">
    スコア<br><span id="scv" style="font-size:22px;font-weight:500;">0</span>
  </div>

  <button id="setgear" style="position:absolute;bottom:14px;right:14px;width:34px;height:34px;border-radius:8px;border:1.5px solid rgba(255,255,255,.3);background:rgba(0,0,0,.45);color:#fff;font-size:17px;cursor:pointer;line-height:1;z-index:10;" title="設定">⚙</button>

  <div id="setpanel" style="display:none;position:absolute;bottom:56px;right:14px;width:220px;background:rgba(10,14,26,.95);border:1px solid rgba(255,255,255,.18);border-radius:12px;padding:16px;color:#fff;font-size:13px;box-shadow:0 4px 24px rgba(0,0,0,.6);z-index:10;">
    <div style="font-size:12px;font-weight:600;letter-spacing:1px;color:#aabbdd;margin-bottom:12px;">⚙ 設定</div>
    <div style="margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span>落下速度</span><span id="speedLabel" style="color:#88ccff;font-weight:600;">×0.10</span>
      </div>
      <input id="speedSlider" type="range" min="1" max="250" step="1" value="10" style="width:100%;accent-color:#66aaff;cursor:pointer;">
      <div style="display:flex;justify-content:space-between;font-size:10px;color:#556;margin-top:2px;"><span>ゆっくり</span><span>速い</span></div>
    </div>
    <div>
      <div style="font-size:12px;color:#aabbdd;margin-bottom:8px;">マップモード</div>
      <div style="display:flex;gap:8px;">
        <button id="btnFixed" onclick="setMapMode('fixed')" style="flex:1;padding:6px 0;font-size:12px;border-radius:6px;border:1.5px solid #66aaff;background:#1a3060;color:#88ccff;cursor:pointer;">固定</button>
        <button id="btnRandom" onclick="setMapMode('random')" style="flex:1;padding:6px 0;font-size:12px;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:transparent;color:#aaa;cursor:pointer;">ランダム</button>
      </div>
    </div>
  </div>

  <div id="cdov" style="display:none;position:absolute;inset:0;pointer-events:none;align-items:center;justify-content:center;z-index:5;">
    <div id="cdnum" style="font-size:96px;font-weight:700;color:#fff;text-shadow:0 0 40px rgba(100,180,255,.9),0 2px 8px rgba(0,0,0,.8);"></div>
  </div>

  <div id="lcov" style="display:none;position:absolute;inset:0;pointer-events:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,40,20,.75);z-index:6;">
    <div id="lcmsg" style="font-size:32px;font-weight:700;color:#66ff88;text-shadow:0 0 30px #00ff88;margin-bottom:8px;"></div>
    <div id="lcnext" style="font-size:14px;color:#aaffcc;"></div>
  </div>

  <div id="ov" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(3,8,16,.92);color:#fff;text-align:center;padding:20px;z-index:7;">
    <div style="font-size:28px;font-weight:500;letter-spacing:2px;margin-bottom:6px;">THE DROPPER</div>
    <div style="font-size:13px;color:#99aacc;margin-bottom:6px;">穴を通り抜けてゴールを目指せ！</div>
    <div style="font-size:12px;color:#556;line-height:1.9;margin-bottom:24px;">WASD / 矢印キーで移動<br>全ての穴を通過してゴール着地でレベルクリア<br>クリアすると次レベルへテレポート！</div>
    <button id="btn" style="padding:10px 32px;font-size:14px;cursor:pointer;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.5);color:#fff;border-radius:8px;letter-spacing:1px;">スタート</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){

/* ─── LEVEL DATA ──────────────────────────────────────
   plates: array of {hx, hz, hw}
   hx/hz = hole center (X/Z axis), hw = hole half-size
   Level 1 = 2 large holes near center
   Level 15 = 7 tiny holes at extremes
──────────────────────────────────────────────────── */
const LEVEL_DATA = [
  {plates:[{hx:0,hz:0,hw:2.8},{hx:1,hz:.5,hw:2.6}]},
  {plates:[{hx:2.5,hz:0,hw:2.5},{hx:-2,hz:1.5,hw:2.3}]},
  {plates:[{hx:0,hz:2.5,hw:2.3},{hx:-2.5,hz:-1,hw:2.1},{hx:2,-2.5,hw:2.0}]},
  {plates:[{hx:3,hz:0,hw:2.0},{hx:-1,hz:3,hw:1.9},{hx:1,hz:-3,hw:1.8}]},
  {plates:[{hx:-3.5,hz:1,hw:1.9},{hx:3.5,hz:-1.5,hw:1.8},{hx:0,hz:4,hw:1.7}]},
  {plates:[{hx:0,hz:0,hw:1.8},{hx:3,hz:2.5,hw:1.7},{hx:-3.5,hz:-1,hw:1.6},{hx:1.5,hz:-3.5,hw:1.6}]},
  {plates:[{hx:-2,hz:3.5,hw:1.6},{hx:4,hz:-.5,hw:1.5},{hx:-4,hz:1.5,hw:1.5},{hx:.5,hz:-4,hw:1.5}]},
  {plates:[{hx:3.5,hz:3.5,hw:1.5},{hx:-3.5,hz:-3,hw:1.4},{hx:3.5,hz:-3.5,hw:1.4},{hx:-3,hz:3.5,hw:1.4}]},
  {plates:[{hx:0,hz:0,hw:1.5},{hx:4,hz:1,hw:1.4},{hx:-4,hz:-1,hw:1.4},{hx:1,hz:-4,hw:1.3},{hx:-1.5,hz:4,hw:1.3}]},
  {plates:[{hx:4.5,hz:0,hw:1.4},{hx:-4.5,hz:2,hw:1.3},{hx:2,hz:4,hw:1.3},{hx:-2,hz:-4,hw:1.3},{hx:0,hz:-4.5,hw:1.3}]},
  {plates:[{hx:3,hz:3,hw:1.3},{hx:-4,hz:0,hw:1.2},{hx:4,hz:-3,hw:1.2},{hx:-2.5,hz:-4,hw:1.2},{hx:0,hz:4.5,hw:1.2}]},
  {plates:[{hx:0,hz:0,hw:1.3},{hx:4,hz:2,hw:1.2},{hx:-4,hz:-2,hw:1.2},{hx:2,hz:-4.5,hw:1.2},{hx:-2.5,hz:4,hw:1.2},{hx:4.5,hz:-1.5,hw:1.1}]},
  {plates:[{hx:4.5,hz:3,hw:1.2},{hx:-4.5,hz:-3,hw:1.2},{hx:0,hz:4.8,hw:1.1},{hx:3.5,hz:-4.5,hw:1.1},{hx:-3.5,hz:4.5,hw:1.1},{hx:-.5,hz:-4.8,hw:1.1}]},
  {plates:[{hx:4.8,hz:0,hw:1.1},{hx:-4.8,hz:1.5,hw:1.1},{hx:1.5,hz:4.8,hw:1.1},{hx:-1.5,hz:-4.8,hw:1.1},{hx:4,hz:-4,hw:1.1},{hx:-4,hz:4,hw:1.0}]},
  {plates:[{hx:0,hz:0,hw:1.2},{hx:4.8,hz:2.5,hw:1.1},{hx:-4.8,hz:-2.5,hw:1.1},{hx:2.5,hz:-4.8,hw:1.0},{hx:-2.5,hz:4.8,hw:1.0},{hx:4.5,hz:-4.5,hw:1.0},{hx:-4.5,hz:-4.5,hw:1.0}]},
];

/* ─── RENDERER ─────────────────────────────────── */
const wrap=document.getElementById('gw');
const canvas=document.getElementById('gc');
const W=wrap.clientWidth||680, H=wrap.clientHeight||520;
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W,H);
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x020508);
const cam=new THREE.PerspectiveCamera(68,W/H,.1,300);
scene.add(new THREE.AmbientLight(0xffffff,.75));
const dl=new THREE.DirectionalLight(0xffffff,.6); dl.position.set(5,10,5); scene.add(dl);
const dl2=new THREE.DirectionalLight(0x8888ff,.3); dl2.position.set(-5,5,-5); scene.add(dl2);

/* ─── CONSTANTS ────────────────────────────────── */
const SHAFT_R=9, BOT=2;
const RAINBOW=[0xff2222,0xff6600,0xffdd00,0x44ff44,0x22ddff,0x2266ff,0xaa22ff,0xff22cc];
const PCOLS=[0xff3333,0xff8800,0xffee00,0x44ff44,0x22ffcc,0x2266ff,0xbb33ff,0xff33bb,0xff6622,0x22ff88,0x88ff22,0x22aaff,0xff4488,0x44ffcc,0xff8844];
const SHAFT_TOP=185; // tall enough for 7 plates with LH=22 + margins

/* ─── SHAFT WALLS ──────────────────────────────── */
const SEG=8;
for(let i=0;i<=Math.ceil((SHAFT_TOP+30)/SEG);i++){
  const col=RAINBOW[i%RAINBOW.length];
  const m=new THREE.Mesh(
    new THREE.CylinderGeometry(SHAFT_R,SHAFT_R,SEG+.1,32,1,true),
    new THREE.MeshPhongMaterial({color:col,side:THREE.BackSide,emissive:col,emissiveIntensity:.18})
  );
  m.position.y=SHAFT_TOP+8-i*SEG; scene.add(m);
}
const topCap=new THREE.Mesh(new THREE.CircleGeometry(SHAFT_R-.1,32),new THREE.MeshBasicMaterial({color:0x111111}));
topCap.rotation.x=Math.PI/2; topCap.position.y=SHAFT_TOP+10; scene.add(topCap);

/* ─── LAUNCH PLATFORM (土台) ───────────────────── */
// Solid ring at the very top — player stands here before falling
const launchDisk=new THREE.Mesh(
  new THREE.CylinderGeometry(SHAFT_R-.5,SHAFT_R-.5,.4,32),
  new THREE.MeshPhongMaterial({color:0x334455,emissive:0x1a2233})
);
launchDisk.position.y=SHAFT_TOP+.2; scene.add(launchDisk);
// Center hole in launch disk (visual only: transparent inner circle)
const launchRing=new THREE.Mesh(
  new THREE.TorusGeometry(SHAFT_R-1.5,1,.8,48),
  new THREE.MeshPhongMaterial({color:0x4466aa,emissive:0x223366,emissiveIntensity:.4})
);
launchRing.rotation.x=Math.PI/2; launchRing.position.y=SHAFT_TOP+.5; scene.add(launchRing);
// Corner pillars
for(let i=0;i<8;i++){
  const a=(i/8)*Math.PI*2;
  const pill=new THREE.Mesh(
    new THREE.CylinderGeometry(.25,.25,2.2,6),
    new THREE.MeshPhongMaterial({color:0x445566})
  );
  pill.position.set(Math.cos(a)*(SHAFT_R-1.5),SHAFT_TOP+1.5,Math.sin(a)*(SHAFT_R-1.5));
  scene.add(pill);
}

/* ─── BOTTOM GOAL ──────────────────────────────── */
const landMesh=new THREE.Mesh(new THREE.CircleGeometry(SHAFT_R-.3,32),new THREE.MeshPhongMaterial({color:0x22cc44,emissive:0x114422}));
landMesh.rotation.x=-Math.PI/2; landMesh.position.y=.5; scene.add(landMesh);
const goalRing=new THREE.Mesh(new THREE.TorusGeometry(4,.3,8,32),new THREE.MeshPhongMaterial({color:0xffff00,emissive:0x888800}));
goalRing.rotation.x=Math.PI/2; goalRing.position.y=1.2; scene.add(goalRing);
const starMat=new THREE.MeshBasicMaterial({color:0xffff00});
for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2;const s=new THREE.Mesh(new THREE.BoxGeometry(.25,.25,.25),starMat);s.position.set(Math.cos(a)*4,1.2,Math.sin(a)*4);scene.add(s);}

/* ─── PLATFORM FACTORY ─────────────────────────── */
const platforms=[];

function makePlatform(plateData,index,total){
  const usable=SHAFT_TOP-20-BOT-10;
  const spacing=usable/(total+1);
  const y=SHAFT_TOP-15-(index+1)*spacing;
  const R=SHAFT_R-.25;
  const {hx,hz,hw}=plateData;

  const outerPts=[];
  for(let i=0;i<72;i++){const a=(i/72)*Math.PI*2;outerPts.push(new THREE.Vector2(R*Math.cos(a),R*Math.sin(a)));}
  const shape=new THREE.Shape(outerPts);
  const holePath=new THREE.Path();
  holePath.setFromPoints([new THREE.Vector2(hx-hw,hz-hw),new THREE.Vector2(hx-hw,hz+hw),new THREE.Vector2(hx+hw,hz+hw),new THREE.Vector2(hx+hw,hz-hw)]);
  shape.holes.push(holePath);

  const col=PCOLS[index%PCOLS.length];
  const platMesh=new THREE.Mesh(new THREE.ShapeGeometry(shape,64),new THREE.MeshPhongMaterial({color:col,side:THREE.DoubleSide,shininess:60}));
  platMesh.rotation.x=Math.PI/2; platMesh.position.y=y; scene.add(platMesh);

  const crossG=new THREE.Group(); crossG.position.set(hx,y+.25,hz);
  const cm=new THREE.MeshBasicMaterial({color:0xffff00});
  const hs=hw*2;
  crossG.add(new THREE.Mesh(new THREE.BoxGeometry(hs+.6,.1,.2),cm));
  crossG.add(new THREE.Mesh(new THREE.BoxGeometry(.2,.1,hs+.6),cm));
  [[-1,-1],[1,-1],[1,1],[-1,1]].forEach(([sx,sz])=>{const d=new THREE.Mesh(new THREE.BoxGeometry(.3,.1,.3),cm);d.position.set(sx*hw,0,sz*hw);crossG.add(d);});
  scene.add(crossG);

  const rimMesh=new THREE.Mesh(new THREE.TorusGeometry(R,.22,6,48),new THREE.MeshPhongMaterial({color:col,emissive:col,emissiveIntensity:.25}));
  rimMesh.rotation.x=Math.PI/2; rimMesh.position.y=y; scene.add(rimMesh);

  platforms.push({y,hx,hz,hw,mesh:platMesh,cross:crossG,rim:rimMesh,passed:false,index});
}

function loadLevel(lvIdx){
  platforms.forEach(p=>{scene.remove(p.mesh);scene.remove(p.cross);scene.remove(p.rim);});
  platforms.length=0;

  let plates=LEVEL_DATA[lvIdx].plates;
  if(mapMode==='random'){
    plates=plates.map(p=>{
      const hw=p.hw, maxOff=SHAFT_R-hw-1.6;
      return {hx:(Math.random()-.5)*2*maxOff,hz:(Math.random()-.5)*2*maxOff,hw};
    });
  }
  plates.forEach((p,i)=>makePlatform(p,i,plates.length));
  document.getElementById('holesTotal').textContent=plates.length;
  document.getElementById('holes').textContent='0';
  document.getElementById('lvl').textContent=lvIdx+1;
}

/* ─── PLAYER ───────────────────────────────────── */
const pG=new THREE.Group();
pG.add(new THREE.Mesh(new THREE.BoxGeometry(.7,1.,.4),new THREE.MeshPhongMaterial({color:0xff4422})));
const hm=new THREE.Mesh(new THREE.SphereGeometry(.28,8,8),new THREE.MeshPhongMaterial({color:0xffcc88}));
hm.position.y=.75; pG.add(hm);
const helm=new THREE.Mesh(new THREE.SphereGeometry(.31,8,8,0,Math.PI*2,0,Math.PI/1.7),new THREE.MeshPhongMaterial({color:0x2244cc}));
helm.position.y=.82; pG.add(helm);
[-1,1].forEach(s=>{const arm=new THREE.Mesh(new THREE.BoxGeometry(.22,.65,.22),new THREE.MeshPhongMaterial({color:0xff4422}));arm.position.set(s*.46,.1,0);arm.rotation.z=s*.55;pG.add(arm);});
scene.add(pG);

/* ─── SPEED LINES ──────────────────────────────── */
const sLines=[];
for(let i=0;i<22;i++){
  const ln=new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,-1,0),new THREE.Vector3(0,1+Math.random()*2.5,0)]),new THREE.LineBasicMaterial({color:0x99ccff,transparent:true,opacity:0}));
  sLines.push({mesh:ln,ox:(Math.random()-.5)*9,oz:(Math.random()-.5)*9});
  scene.add(ln);
}

/* ─── SETTINGS ─────────────────────────────────── */
let speedMult=.1, mapMode='fixed';
window.setMapMode=function(mode){
  mapMode=mode;
  const on='flex:1;padding:6px 0;font-size:12px;border-radius:6px;border:1.5px solid #66aaff;background:#1a3060;color:#88ccff;cursor:pointer;';
  const off='flex:1;padding:6px 0;font-size:12px;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:transparent;color:#aaa;cursor:pointer;';
  document.getElementById('btnFixed').style.cssText=mode==='fixed'?on:off;
  document.getElementById('btnRandom').style.cssText=mode==='random'?on:off;
};
const speedSlider=document.getElementById('speedSlider');
const speedLabel=document.getElementById('speedLabel');
speedSlider.addEventListener('input',()=>{speedMult=speedSlider.value/100;speedLabel.textContent='×'+speedMult.toFixed(2);});
const setgear=document.getElementById('setgear');
const setpanel=document.getElementById('setpanel');
let panelOpen=false;
setgear.onclick=()=>{panelOpen=!panelOpen;setpanel.style.display=panelOpen?'block':'none';setgear.style.background=panelOpen?'rgba(40,80,160,.7)':'rgba(0,0,0,.45)';};

/* ─── STATE ────────────────────────────────────── */
let gs='menu', vel={x:0,y:0,z:0}, T=0, gsc=0;
let currentLevel=0, levelClearing=false, levelClearTimer=0;
const keys={};
const PLAYER_START_Y=SHAFT_TOP+2.5;

document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  ['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)&&e.preventDefault();
  if(gs==='win'||gs==='over') startGame();
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
wrap.addEventListener('touchmove',e=>{
  const r=wrap.getBoundingClientRect();
  const dx=e.touches[0].clientX-(r.left+W/2),dz=e.touches[0].clientY-(r.top+H/2);
  keys['TL']=dx<-20;keys['TR']=dx>20;keys['TF']=dz<-20;keys['TB']=dz>20;
},{passive:true});
wrap.addEventListener('touchend',()=>{keys['TL']=keys['TR']=keys['TF']=keys['TB']=false;},{passive:true});

/* ─── HUD ──────────────────────────────────────── */
function showHUD(on){
  document.getElementById('hud').style.display=on?'block':'none';
  document.getElementById('scd').style.display=on?'block':'none';
  if(!on){setpanel.style.display='none';panelOpen=false;setgear.style.background='rgba(0,0,0,.45)';}
}

/* ─── COUNTDOWN ────────────────────────────────── */
let countdownVal=0;
const cdov=document.getElementById('cdov');
const cdnum=document.getElementById('cdnum');
function startCountdown(){
  countdownVal=3;
  cdov.style.display='flex';
  cdnum.textContent='3';
  cdnum.style.transform='scale(1)';
  gs='countdown';
}

/* ─── GAME START ───────────────────────────────── */
function startGame(){
  document.getElementById('ov').style.display='none';
  document.getElementById('lcov').style.display='none';
  showHUD(true);
  currentLevel=0; gsc=0;
  document.getElementById('scv').textContent='0';
  loadLevel(currentLevel);
  placePlayerAtTop();
  startCountdown();
}
document.getElementById('btn').onclick=startGame;
window.startGame=startGame;

function placePlayerAtTop(){
  pG.position.set(0,PLAYER_START_Y,0);
  pG.rotation.set(0,0,0); pG.visible=true;
  pG.traverse(m=>{if(m.isMesh&&m.material)m.material.color.set(m.userData.origCol||m.material.color);});
  vel={x:0,y:0,z:0}; T=0; levelClearing=false;
}

/* ─── LEVEL CLEAR → TP ─────────────────────────── */
function advanceLevel(){
  const clearedNum=currentLevel+1;
  currentLevel++;
  if(currentLevel>=LEVEL_DATA.length){endGame(true);return;}
  const lcov=document.getElementById('lcov');
  document.getElementById('lcmsg').textContent=`LEVEL ${clearedNum} CLEAR！`;
  document.getElementById('lcnext').textContent=`→ LEVEL ${currentLevel+1} へテレポート…`;
  lcov.style.display='flex';
  levelClearing=true;
  levelClearTimer=2.0;
}

function endGame(win){
  gs=win?'win':'over';
  pG.visible=true;
  cdov.style.display='none';
  document.getElementById('lcov').style.display='none';
  showHUD(false);
  const ov=document.getElementById('ov');
  ov.style.display='flex';
  ov.innerHTML=`
    <div style="font-size:24px;font-weight:500;margin-bottom:10px;color:${win?'#66ff88':'#ff6666'}">${win?'🎉 全レベルクリア！':'💥 激突…'}</div>
    <div style="font-size:14px;color:#aabbcc;margin-bottom:6px;">${win?`スコア: ${gsc} 点`:`レベル ${currentLevel+1} で激突！`}</div>
    <div style="font-size:12px;color:#556;margin-bottom:20px;">速度: ×${speedMult.toFixed(2)}</div>
    <button id="rbtn" style="padding:10px 32px;font-size:14px;cursor:pointer;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.5);color:#fff;border-radius:8px;letter-spacing:1px;">もう一度</button>`;
  document.getElementById('rbtn').onclick=startGame;
}

/* ─── UPDATE ───────────────────────────────────── */
function update(dt){
  // Countdown phase
  if(gs==='countdown'){
    countdownVal-=dt;
    const n=Math.ceil(countdownVal);
    cdnum.textContent=n>0?n:'GO！';
    cdnum.style.transform=`scale(${1+(countdownVal%1)*.4})`;
    if(countdownVal<=-0.5){cdov.style.display='none';vel={x:0,y:-.05,z:0};gs='playing';}
    goalRing.rotation.z+=.04*dt*60;
    return;
  }
  if(gs!=='playing') return;
  T+=dt;

  // Level clear TP timer
  if(levelClearing){
    levelClearTimer-=dt;
    if(levelClearTimer<=0){
      document.getElementById('lcov').style.display='none';
      levelClearing=false;
      loadLevel(currentLevel);
      placePlayerAtTop();
      startCountdown();
    }
    goalRing.rotation.z+=.04*dt*60;
    return;
  }

  // Movement
  const mx=((keys['ArrowRight']||keys['KeyD']||keys['TR'])?1:0)-((keys['ArrowLeft']||keys['KeyA']||keys['TL'])?1:0);
  const mz=((keys['ArrowDown']||keys['KeyS']||keys['TB'])?1:0)-((keys['ArrowUp']||keys['KeyW']||keys['TF'])?1:0);
  vel.x+=(mx*.17-vel.x)*.2;
  vel.z+=(mz*.17-vel.z)*.2;
  const gravity=.028*speedMult, maxFall=3.2*speedMult;
  vel.y-=gravity*dt*60;
  vel.y=Math.max(vel.y,-maxFall);

  const prevY=pG.position.y;
  pG.position.x+=vel.x;
  pG.position.y+=vel.y;
  pG.position.z+=vel.z;

  // Shaft boundary
  const rr=pG.position.x**2+pG.position.z**2;
  const maxR=SHAFT_R-1.1;
  if(rr>maxR*maxR){
    const r=Math.sqrt(rr);
    const nx=pG.position.x/r,nz=pG.position.z/r;
    pG.position.x=nx*maxR;pG.position.z=nz*maxR;
    const vn=vel.x*nx+vel.z*nz;
    vel.x-=vn*nx*1.8;vel.z-=vn*nz*1.8;
  }
  pG.rotation.z=THREE.MathUtils.lerp(pG.rotation.z,-mx*.45,.12);
  pG.rotation.x=THREE.MathUtils.lerp(pG.rotation.x,mz*.3,.12);

  // Speed lines
  const sf=Math.abs(vel.y)/maxFall;
  sLines.forEach(s=>{s.mesh.position.set(pG.position.x+s.ox,pG.position.y+2.5,pG.position.z+s.oz);s.mesh.material.opacity=sf*.55;s.mesh.scale.y=.3+sf*4.5;});
  goalRing.rotation.z+=.04*dt*60;

  // Platform collision
  for(const p of platforms){
    if(p.passed) continue;
    if(prevY>=p.y&&pG.position.y<p.y){
      const inHole=Math.abs(pG.position.x-p.hx)<p.hw*1.08&&Math.abs(pG.position.z-p.hz)<p.hw*1.08;
      if(!inHole){pG.traverse(m=>{if(m.isMesh)m.material.color.set(0xffffff);});endGame(false);return;}
      p.passed=true;
      p.cross.visible=false;
      p.mesh.material.transparent=true;p.mesh.material.opacity=.2;
      p.rim.material.transparent=true;p.rim.material.opacity=.15;
      gsc+=100+Math.round(speedMult*80)+Math.round((2.8-p.hw)*30);
      document.getElementById('holes').textContent=platforms.filter(x=>x.passed).length;
      document.getElementById('scv').textContent=gsc;
    }
  }

  // Pulse on next hole
  const next=platforms.find(p=>!p.passed);
  platforms.forEach(p=>{
    if(!p.passed&&p.cross.visible){
      const pulse=p===next?(Math.sin(T*8)*.5+.5):0;
      p.cross.children.forEach(c=>{if(c.material)c.material.color.setHSL(.17,1,.5+pulse*.45);});
    }
  });

  // Reached bottom
  if(pG.position.y<=BOT){
    if(platforms.every(p=>p.passed)){
      gsc+=300+(15-currentLevel)*20;
      document.getElementById('scv').textContent=gsc;
      advanceLevel();
    } else {
      // Missed some holes → game over
      pG.traverse(m=>{if(m.isMesh)m.material.color.set(0xffffff);});
      endGame(false);
    }
    return;
  }

  // Camera
  const tcx=pG.position.x*.25,tcy=pG.position.y+8,tcz=pG.position.z+8;
  cam.position.x+=(tcx-cam.position.x)*.1;
  cam.position.y+=(tcy-cam.position.y)*.1;
  cam.position.z+=(tcz-cam.position.z)*.1;
  cam.lookAt(pG.position.x,pG.position.y-5,pG.position.z);
}

/* ─── MAIN LOOP ────────────────────────────────── */
cam.position.set(6,SHAFT_TOP-25,14);
cam.lookAt(0,SHAFT_TOP-45,0);
let lastT=0;
function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min((now-lastT)/1000,.05);
  lastT=now;
  if(gs==='playing'||gs==='countdown'){
    update(dt);
  } else {
    const t=now*.0004;
    cam.position.x=Math.sin(t)*7;
    cam.position.z=Math.cos(t)*7+10;
    cam.position.y=SHAFT_TOP-20+Math.sin(t*.6)*15;
    cam.lookAt(0,cam.position.y-25,0);
  }
  renderer.render(scene,cam);
}
requestAnimationFrame(loop);
})();
</script>
